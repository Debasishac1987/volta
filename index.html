<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>My Reveal.js Presentation</title>

  <link rel="stylesheet" href="dist/reveal.css">
  <link rel="stylesheet" href="dist/theme/black.css">

</head>
<body>

<div class="reveal">
  <div class="slides">

    <section>
      <h1>Hello Reveal.js</h1>
      <p>My first web-based presentation</p>
    </section>

    <section>
      <h2>Second Slide</h2>
      <ul>
        <li>Point one</li>
        <li>Point two</li>
      </ul>
    </section>

    <!-- Vertical slides -->
    <section>
      <section>Vertical Slide A</section>
      <section>Vertical Slide B</section>
    </section>

  </div>
</div>

<script src="dist/reveal.js"></script>
<script>
  Reveal.initialize({
    hash: true
  });
</script>

</body>
</html>
